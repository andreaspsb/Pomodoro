name: 🍅 Deploy — Meu Pomodoro

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ─── Job 1: Lint / Smoke Test ────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (node --check)
        run: |
          node --check server/index.js
          node --check server/db.js
          node --check server/migrate.js
          node --check server/routes/sync.js
          node --check server/routes/sessions.js
          node --check server/routes/settings-route.js

  # ─── Job 2: Deploy no Railway ────────────────────────────────────────────────
  deploy:
    name: Deploy → Railway
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service meu-pomodoro \
            --environment production \
            --detach \
            -m "Deploy from GitHub Actions — ${{ github.sha }}"

      - name: Run database migration
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway run \
            --service meu-pomodoro \
            --environment production \
            npm run migrate

      - name: Verify health check
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Aguardando 20s para o deploy estabilizar..."
          sleep 20

          # Busca o domínio público do serviço
          DOMAIN=$(railway domain --service meu-pomodoro --environment production --json 2>/dev/null | jq -r '.domain // empty' || true)

          if [ -z "$DOMAIN" ]; then
            echo "⚠️  Nenhum domínio público encontrado. Pulando health check HTTP."
            echo "✅  Deploy concluído (sem domínio público configurado)."
            exit 0
          fi

          URL="https://$DOMAIN/api/health"
          echo "Verificando $URL"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅  Health check OK ($URL)"
              exit 0
            fi
            echo "Tentativa $i: status $STATUS — aguardando 10s..."
            sleep 10
          done

          echo "❌  Health check falhou após 5 tentativas."
          exit 1
